
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Psychoactive Herb Index</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; margin: 0; padding: 2rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.05); }
    th, td { padding: 0.75rem; border-bottom: 1px solid #ddd; text-align: left; font-size: 0.9rem; }
    th { background: #f0f0f0; font-weight: 600; }
    tr:hover { background: #f9f9f9; }
    .expand-row td { background: #fffef0; font-size: 0.85rem; line-height: 1.5; }
    .expand-row { display: none; }
    .favorite-star.active { color: gold; }
    td:first-child { text-align: center; cursor: pointer; }
    td:nth-child(2) { cursor: pointer; color: #0056a7; text-decoration: underline; }
    @media screen and (max-width: 768px) {
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      td { position: relative; padding-left: 50%; border: none; border-bottom: 1px solid #eee; }
      td::before {
        position: absolute; top: 0; left: 6px; width: 45%; white-space: nowrap;
        font-weight: bold;
      }
    }
  </style>
</head>
<body>
  <h1>Psychoactive Herb Index</h1>
  <table id="herbTable">
    <thead>
      <tr>
        <th>⭐</th>
        <th>Herb</th>
        <th>Category</th>
        <th>Effects</th>
        <th>Preparation</th>
        <th>Intensity</th>
        <th>Onset</th>
        <th>Legal Status</th>
        <th>Region</th>
        <th>Tags</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="psychoactive_herb_index_data.js"></script>
  <script>
    function toggleExpandRow(cell) {
      const row = cell.closest("tr");
      const nextRow = row.nextElementSibling;
      if (nextRow && nextRow.classList.contains("expand-row")) {
        nextRow.style.display = nextRow.style.display === "none" ? "table-row" : "none";
      }
    }

    function toggleFavorite(cell) {
      cell.classList.toggle("active");
      cell.textContent = cell.classList.contains("active") ? "★" : "☆";
    }

    document.addEventListener("DOMContentLoaded", () => {
      const tbody = document.querySelector("#herbTable tbody");

      herbData.forEach((herb) => {
        const mainRow = document.createElement("tr");
        mainRow.innerHTML = `
          <td onclick="toggleFavorite(this)">☆</td>
          <td onclick="toggleExpandRow(this)">${herb.Herb}</td>
          <td>${herb.Category}</td>
          <td>${herb.Effects}</td>
          <td>${herb.Preparation}</td>
          <td>${herb.Intensity}</td>
          <td>${herb.Onset}</td>
          <td>${herb["Legal Status"]}</td>
          <td>${herb.Region}</td>
          <td>${herb.Tags}</td>
        `;

        const expandRow = document.createElement("tr");
        expandRow.className = "expand-row";
        expandRow.innerHTML = `
          <td colspan="10">
            <strong>Mechanism of Action:</strong> ${herb["Mechanism of Action"]}<br/>
            <strong>Pharmacokinetics:</strong> ${herb.Pharmacokinetics}<br/>
            <strong>Therapeutic Uses:</strong> ${herb["Therapeutic Uses"]}<br/>
            <strong>Side Effects:</strong> ${herb["Side Effects"]}<br/>
            <strong>Contraindications:</strong> ${herb.Contraindications}<br/>
            <strong>Drug Interactions:</strong> ${herb["Drug Interactions"]}<br/>
            <strong>Toxicity:</strong> ${herb.Toxicity}<br/>
            <strong>Toxicity / LD50:</strong> ${herb["Toxicity / LD50"]}
          </td>
        `;

        tbody.appendChild(mainRow);
        tbody.appendChild(expandRow);
      });
    });
  </script>
</body>
</html>
